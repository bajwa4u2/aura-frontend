name: aura
description: "Aura — a writing platform built for continuity."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation + state
  go_router: ^14.2.0
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Local persistence
  shared_preferences: ^2.2.3

  # External links
  url_launcher: ^6.3.0

  # Media + file picking
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  record: ^5.1.2
  cached_network_image: ^3.3.1

  # SVG support (for Aura logo)
  flutter_svg: ^2.0.10

  # Render white paper markdown in-app
  flutter_markdown: ^0.7.3

  # PDF viewer
  syncfusion_flutter_pdfviewer: ^29.2.11

  # App icon generator
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/investor/
    - assets/brand/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/aura_icon.png"
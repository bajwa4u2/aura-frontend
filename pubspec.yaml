name: aura
description: "Aura — institution operating infrastructure: the system an institution runs its public and member-facing life on."
publish_to: "none"
# Version convention:
#   X.Y.Z   — semantic build name, exposed everywhere
#   +B      — Flutter build number (Android versionCode, iOS CFBundleVersion)
#
# Windows MSIX requires a 4-part X.Y.Z.W version where W (revision) must
# be 0 per Microsoft Store policy. Keep `msix_version` aligned with the
# X.Y.Z parts of `version` and zero out the build component to satisfy
# the store rule. A pre-build script could enforce this automatically;
# for now it's a manual sync.
version: 1.1.5+18

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation + state
  go_router: ^14.2.0
  flutter_riverpod: ^2.6.1

  # Firebase push notifications
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10

  # Networking
  dio: ^5.7.0
  socket_io_client: ^3.0.2

  # Local persistence
  shared_preferences: ^2.2.3

  # Runtime app/build version + platform metadata for canonical client identity
  # (Phase 2 of cross-platform release governance). Sent on every HTTP request
  # and WebSocket handshake so the backend can govern per-distribution rollouts,
  # min-version enforcement, and protocol compatibility.
  package_info_plus: ^8.0.0

  # External links
  url_launcher: ^6.3.0

  # Media + file picking
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  record: ^6.2.0
  cached_network_image: ^3.3.1
  video_player: ^2.11.1
  flutter_webrtc: ^1.4.1

  # SVG support (for Aura logo)
  flutter_svg: ^2.0.10

  # Render white paper markdown in-app
  flutter_markdown: ^0.7.3

  # PDF viewer
  syncfusion_flutter_pdfviewer: ^29.2.11

  # App icon generator
  flutter_launcher_icons: ^0.14.4

  flutter_web_plugins:
    sdk: flutter
  http: ^1.6.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  msix: ^3.16.8
  # Pure-Dart image library used by tool/generate_store_assets.dart to
  # rasterize the master Aura SVG into platform/store PNGs without any
  # native imaging dependency.
  image: ^4.8.0

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/investor/
    - assets/brand/
    - assets/adi-registration.properties

flutter_launcher_icons:
  # Pure-Dart pipeline produced every platform/store asset under
  # `assets/store/`; we already copied those into the platform res
  # directories. This block is kept so `dart run flutter_launcher_icons`
  # remains a one-shot way to refresh launcher icons from a single
  # square master PNG (the generator's `play_icon_512.png` output) — it
  # writes the same density-bucket mipmaps and adaptive icon layers the
  # generator wrote, so re-running it is idempotent.
  android: "ic_launcher"
  # iOS icons are written natively at every required size by the
  # pure-Dart generator (App Store wants 1024 unscaled). Skipping
  # flutter_launcher_icons' iOS pass keeps those crisp.
  ios: false
  image_path: "assets/store/android/play_icon_512.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/store/android/adaptive_foreground.png"
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false
    image_path: "assets/store/windows/app_icon_310.png"
    icon_size: 256
  macos:
    generate: false
    image_path: "assets/store/macos/app_icon_1024.png"

msix_config:
  # Identity values below are the exact values issued by Microsoft Partner
  # Center for this product. Do not edit without re-checking Partner Center
  # → Apps and games → Aura → Product identity. A mismatch on any of the
  # three identity fields is a hard Store certification failure.
  #
  # `display_name` MUST equal the reserved Store product name verbatim —
  # the msix package writes this string into BOTH
  # Package/Properties/DisplayName AND Application/VisualElements@DisplayName,
  # and Partner Center validates the Properties value against your
  # reservation. A previous submission failed certification because this
  # was set to "Aura" instead of the reserved "AURA PLATFORM".
  display_name: AURA PLATFORM
  publisher_display_name: Aura Platform LLC
  identity_name: AuraPlatformLLC.AURAPLATFORM
  # MUST equal the X.Y.Z prefix of `version:` above with a trailing
  # .0 revision (Microsoft Store policy). Bump in lockstep on every
  # release — Partner Center rejects an upload whose MSIX version is
  # lower or equal to a previously-shipped build.
  #
  # 2026-05-13 bump: the prior submission (1.0.2.0) was rejected for
  # Policy 10.5.1 because the privacy URL redirected to
  # http://auraplatform.org:8080/privacy/ (nginx absolute_redirect
  # leaked the internal upstream origin past Railway's TLS edge). The
  # routing fix is in Dockerfile + nginx.conf; this bump produces a
  # new MSIX so Partner Center accepts a resubmission and the
  # corrected privacy URL is the one the new package points to.
  #
  # 2026-05-13 bump #2 (1.1.2.0): carries the realtime ringing
  # cross-device resolution pass (notifyAcceptedAcrossDevices socket-side
  # dedup + auto-end terminal fanout) AND the Windows runtime
  # minimum-window-size enforcement (win32_window.cpp WM_GETMINMAXINFO)
  # so the shell no longer drops into a mobile/tablet collapsed layout
  # when the user drags the window narrow. Partner Center requires a
  # strict version bump on every resubmission.
  #
  # 2026-05-21 bump (1.1.3.0): discourse runtime maturity release —
  # selectable/copyable discourse text, evidence-grade media viewer
  # (zoom / pan / open original / download original), desktop
  # reading-width public-record composition, and desktop contextual
  # discourse rails on the detail surfaces.
  msix_version: 1.1.5.0
  description: Aura — institution operating infrastructure: the system an institution runs its public and member-facing life on.
  publisher: CN=3E4027A7-4D4D-4492-B8DE-BBE425E307E5
  logo_path: assets\aura_icon.png
  icons_background_color: "#1A1A2E"
  capabilities: internetClient
  architecture: x64
  store: true
<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- ─── Identity ──────────────────────────────────────────────────
       The following block is the crawler-visible foundation.
       It is rendered server-side (static HTML) and does NOT depend
       on Flutter hydration, so LinkedInBot, Twitterbot, Slackbot,
       and Discordbot all see real metadata.

       Route-specific variants of this file are generated at build
       time by `tool/web/generate_route_metadata.dart`, which clones
       this file into `build/web/<route>/index.html` and substitutes
       the tags marked with `data-aura-meta="…"`. Nginx serves those
       directory indexes before falling back to root /index.html.
       Do not remove the `data-aura-meta` attributes; the post-build
       step keys off them. ────────────────────────────────────────── -->

  <title data-aura-meta="title">Aura Platform — Institution Operating Infrastructure</title>
  <meta name="description" data-aura-meta="description" content="Aura is institution operating infrastructure — the system an institution runs its public and member-facing life on: verified identity, members, spaces, announcements, correspondence, and live sessions, on one accountable record.">
  <link rel="canonical" data-aura-meta="canonical" href="https://auraplatform.org/">

  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="theme-color" content="#1A1A2E">
  <meta name="color-scheme" content="dark light">

  <!-- ─── Open Graph (LinkedIn, Facebook, Discord, Slack) ─────────── -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Aura Platform">
  <meta property="og:locale" content="en_US">
  <meta property="og:title" data-aura-meta="og:title" content="Aura Platform — Institution Operating Infrastructure">
  <meta property="og:description" data-aura-meta="og:description" content="The system an institution runs its public and member-facing life on — verified identity, members, spaces, announcements, correspondence, and live sessions, on one accountable record.">
  <meta property="og:url" data-aura-meta="og:url" content="https://auraplatform.org/">
  <meta property="og:image" data-aura-meta="og:image" content="https://auraplatform.org/social/og-default.png">
  <meta property="og:image:secure_url" data-aura-meta="og:image:secure_url" content="https://auraplatform.org/social/og-default.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" data-aura-meta="og:image:alt" content="Aura Platform — institution operating infrastructure">

  <!-- ─── Twitter / X card ────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" data-aura-meta="twitter:title" content="Aura Platform — Institution Operating Infrastructure">
  <meta name="twitter:description" data-aura-meta="twitter:description" content="The system an institution runs its public and member-facing life on — verified identity, members, spaces, announcements, correspondence, and live sessions, on one accountable record.">
  <meta name="twitter:image" data-aura-meta="twitter:image" content="https://auraplatform.org/social/og-default.png">
  <meta name="twitter:image:alt" data-aura-meta="twitter:image:alt" content="Aura Platform — institution operating infrastructure">

  <!-- ─── Mobile PWA hints ────────────────────────────────────────── -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aura">
  <meta name="application-name" content="Aura Platform">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=2">

  <!-- ─── Material Icons (font-based glyphs used in the app) ──────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <style>
    .material-icons,
    .material-icons-outlined,
    .material-symbols-outlined,
    .material-symbols-rounded,
    .material-symbols-sharp {
      font-family: 'Material Icons' !important;
      font-weight: normal !important;
      font-style: normal !important;
      letter-spacing: normal !important;
      text-transform: none !important;
      line-height: 1 !important;
      white-space: nowrap !important;
      direction: ltr !important;
      -webkit-font-smoothing: antialiased !important;
      -moz-osx-font-smoothing: grayscale !important;
    }
  </style>

  <link rel="icon" type="image/x-icon" href="favicon.ico?v=2"/>
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png?v=2"/>
  <link rel="manifest" href="manifest.json">

  <!-- ─── Structured data (schema.org Organization) ───────────────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Aura Platform LLC",
    "url": "https://auraplatform.org",
    "logo": "https://auraplatform.org/icons/Icon-512.png",
    "description": "Aura Platform LLC builds continuity infrastructure for institutions — three products on one shared substrate. Aura is institution operating infrastructure; Orchestrate is commercial execution infrastructure; Bajwa Writes is continuity & preservation infrastructure.",
    "brand": [
      { "@type": "Brand", "name": "Aura" },
      { "@type": "Brand", "name": "Orchestrate" },
      { "@type": "Brand", "name": "Bajwa Writes" }
    ]
  }
  </script>
</head>
<body>
  <!-- Flutter loader (newer Flutter) -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Fallback loader (older Flutter builds) -->
  <script>
    (function () {
      var tryOld = function () {
        var s1 = document.createElement('script');
        s1.src = 'flutter.js';
        s1.defer = true;
        s1.onload = function () {
          if (!window._flutter || !window._flutter.loader) return;
          window._flutter.loader.load({
            serviceWorkerSettings: { serviceWorkerVersion: null },
            onEntrypointLoaded: function (engineInitializer) {
              return engineInitializer.initializeEngine().then(function (appRunner) {
                return appRunner.runApp();
              });
            }
          });
        };
        document.body.appendChild(s1);
      };

      window.addEventListener('error', function (e) {
        if (String(e && e.filename || '').includes('flutter_bootstrap.js')) {
          tryOld();
        }
      });
    })();
  </script>
</body>
</html>

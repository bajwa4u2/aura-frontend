# nixpacks.toml
[phases.build]
cmds = [
  "flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL --dart-define=AURA_ADMIN_USER_IDS=$AURA_ADMIN_USER_IDS --dart-define=AURA_WEB_PUSH_VAPID_PUBLIC_KEY=$AURA_WEB_PUSH_VAPID_PUBLIC_KEY",
  "dart run tool/web/generate_route_metadata.dart"
]
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">

  <!-- Gold ring -->
  <circle cx="100" cy="100" r="60"
    fill="none"
    stroke="#C7A96B"
    stroke-width="8"/>

  <!-- ticks around circle -->
  <g stroke="#2E2E2E" stroke-width="6" stroke-linecap="round">
    <line x1="100" y1="20" x2="100" y2="10"/>
    <line x1="100" y1="180" x2="100" y2="190"/>
    <line x1="20" y1="100" x2="10" y2="100"/>
    <line x1="180" y1="100" x2="190" y2="100"/>

    <line x1="45" y1="45" x2="35" y2="35"/>
    <line x1="155" y1="45" x2="165" y2="35"/>
    <line x1="45" y1="155" x2="35" y2="165"/>
    <line x1="155" y1="155" x2="165" y2="165"/>
  </g>

  <!-- AURA text -->
  <text
    x="230"
    y="125"
    font-family="Times New Roman, serif"
    font-size="80"
    letter-spacing="6"
    fill="#D8D8D8">
    AURA
  </text>

</svg>
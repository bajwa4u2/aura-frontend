services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aura
    ports:
      - "5432:5432"
    volumes:
      - aura_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000

      # DB inside compose network
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aura?schema=public
      REDIS_URL: redis://redis:6379

      # JWT (set to your real values)
      JWT_SECRET: local_master_secret_key_123
      JWT_ACCESS_SECRET: local_access_super_secret_key_123
      JWT_REFRESH_SECRET: local_refresh_super_secret_key_123

      # CORS
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  aura_pg:

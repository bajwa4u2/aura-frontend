server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Cache static assets aggressively
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # Dynamic share pages. Proxied to the NestJS share controller (api.auraplatform.org/v1/p/...)
  # so external crawlers fetching auraplatform.org/p/<id> receive route-specific
  # OG metadata for posts, institution posts, and announcements. Humans are
  # bounced into the workspace SPA (app.auraplatform.org) by the backend response.
  # The Dockerfile-baked template uses ${AURA_BACKEND_API_ORIGIN}; the literal here
  # is the documented default — keep them in sync.
  location /p/ {
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;
    proxy_pass https://api.auraplatform.org/v1/p/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host api.auraplatform.org;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 15s;
    proxy_connect_timeout 5s;
  }

  # Flutter web SPA fallback. Per-route directory indexes generated by
  # tool/web/generate_route_metadata.dart resolve here via $uri/ before
  # falling back to /index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}

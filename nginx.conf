server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Redirect-leak guard ───────────────────────────────────────────
  # The container listens on plain HTTP at :8080. Without these two
  # directives, any nginx-issued redirect (most notably the implicit
  # trailing-slash redirect for directory access) becomes an absolute
  # URL with scheme=http and port=8080 — leaking the internal upstream
  # origin past the Railway TLS edge. Both must stay off in production.
  absolute_redirect off;
  port_in_redirect off;
  server_tokens off;

  # App shell / entrypoints have STABLE names but change every build, so they
  # MUST revalidate. Serving them immutable (below) freezes returning users on
  # the old build for up to 30 days. no-cache still allows etag 304s. Exact (=)
  # and the .part.js regex are matched before the immutable rule.
  location = /index.html { add_header Cache-Control "no-cache"; }
  location = /flutter_service_worker.js { add_header Cache-Control "no-cache"; }
  location = /flutter_bootstrap.js { add_header Cache-Control "no-cache"; }
  location = /version.json { add_header Cache-Control "no-cache"; }
  location = /main.dart.js { add_header Cache-Control "no-cache"; }
  location ~* \.part\.js$ { try_files $uri =404; add_header Cache-Control "no-cache"; }

  # Cache truly content-addressed assets aggressively (hashed names)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  # Dynamic share pages. Proxied to the NestJS share controller (api.auraplatform.org/v1/p/...)
  # so external crawlers fetching auraplatform.org/p/<id> receive route-specific
  # OG metadata for posts, institution posts, and announcements. Humans are
  # bounced into the workspace SPA (app.auraplatform.org) by the backend response.
  # The Dockerfile-baked template uses ${AURA_BACKEND_API_ORIGIN}; the literal here
  # is the documented default — keep them in sync.
  location /p/ {
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout 5s;
    proxy_pass https://api.auraplatform.org/v1/p/;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host api.auraplatform.org;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 15s;
    proxy_connect_timeout 5s;
  }

  # Flutter web SPA fallback. The $uri/index.html clause lets a
  # request for /privacy resolve directly to /privacy/index.html
  # (per-route variant from generate_route_metadata.dart) WITHOUT the
  # implicit trailing-slash 301 redirect that previously leaked the
  # internal :8080 origin to clients.
  location / {
    try_files $uri $uri/index.html $uri/ /index.html;
  }
}
